<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이기킹의 비행기 - 1945 슈팅 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- 인게임 HUD -->
        <div id="ui-overlay">
            <div id="hud-left">
                <div id="score-label">SCORE</div>
                <div id="score-value">0</div>
            </div>
            <div id="hud-right">
                <div id="wave-label">WAVE 1</div>
                <div id="health-bar-container">
                    <div id="health-bar"></div>
                </div>
            </div>
        </div>

        <!-- 시작 화면 -->
        <div id="start-screen" class="overlay">
            <div class="title-container">
                <h1>이기킹의 비행기</h1>
                <p class="subtitle">전설의 비행이 시작됩니다. 하늘의 지배자가 되어보세요!</p>
            </div>
            
            <div class="menu-controls">
                <button id="start-button" class="main-btn">미션 시작</button>
                <button id="scoreboard-button" class="sub-btn">점수판</button>
            </div>
        </div>

        <!-- 점수판 모달 -->
        <div id="scoreboard-modal" class="overlay hidden">
            <div class="modal-content">
                <h2>명예의 전당</h2>
                <div id="scores-list">
                    <!-- 스크립트에서 동적으로 생성됨 -->
                </div>
                <button id="close-scoreboard" class="sub-btn">닫기</button>
            </div>
        </div>

        <!-- 게임 오버 화면 -->
        <div id="game-over-screen" class="overlay hidden">
            <div class="game-over-content">
                <h1>MISSION FAILED</h1>
                <p class="final-score-text">최종 점수: <span id="final-score">0</span></p>
                <div class="menu-controls">
                    <button id="restart-button" class="main-btn">재도전</button>
                    <button id="exit-button" class="sub-btn">처음으로</button>
                </div>
            </div>
        </div>

        <!-- 파워업 알림 -->
        <div id="powerup-notify" class="hidden">POWER UP!</div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
